<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anki Manual Formatter</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #111;
    font-family: 'Meiryo UI', 'メイリオ', sans-serif;
    color: #ccc;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 12px;
  }

  .header { width: 100%; max-width: 1600px; margin-bottom: 24px; }
  .header-label { font-size: 10px; letter-spacing: 5px; color: #555; text-transform: uppercase; margin-bottom: 6px; }
  .header-line { height: 1px; background: linear-gradient(90deg, #e8c27a44, transparent); }

  .toolbar {
    width: 100%; max-width: 1600px;
    display: flex; gap: 8px; margin-bottom: 12px;
    flex-wrap: wrap; align-items: center;
  }
  .toolbar-label { font-size: 10px; color: #444; letter-spacing: 2px; margin-right: 4px; }

  button {
    background: #1c1c1c;
    border: 1px solid #2a2a2a;
    color: #bbb;
    font-family: 'Meiryo UI', 'メイリオ', sans-serif;
    font-size: 13px;
    padding: 6px 16px;
    border-radius: 4px;
    cursor: pointer;
    transition: border-color 0.15s, opacity 0.15s;
  }
  button:hover:not(:disabled) { border-color: #e8c27a; }
  button:disabled { opacity: 0.3; cursor: default; }

  #btn-underline { text-decoration: underline; }
  #btn-bold { font-weight: bold; }
  #btn-gray { color: #666; }
  #btn-question { color: #c0a8e8; }
  #btn-question:hover:not(:disabled) { border-color: #c0a8e8; }
  #btn-speaker-a { color: #c0392b; }
  #btn-speaker-b { color: #a8c8e8; }

  .divider { width: 1px; height: 24px; background: #2a2a2a; margin: 0 4px; }
  .btn-wrap { display: flex; flex-direction: column; align-items: center; }
  .shortcut-hint { font-size: 9px; color: #444; display: block; text-align: center; margin-top: 2px; }
  .legend { margin-left: auto; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }

  /* Panes */
  .panes-wrapper {
    width: 100%; max-width: 1600px;
    display: flex;
    gap: 0;
    height: 560px;
    min-height: 120px;
    align-items: flex-start;
  }

  .pane { display: flex; flex-direction: column; min-width: 80px; flex: 1; height: 100%; }
  .pane-label {
    font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
    margin-bottom: 6px; flex-shrink: 0;
    padding: 3px 10px; border-radius: 3px;
    display: inline-block; align-self: flex-start;
  }
  #paneLeft .pane-label { color: #888; background: #88888818; border: 1px solid #88888833; }
  #paneRight .pane-label { color: #888; background: #88888818; border: 1px solid #88888833; }

  #editor {
    flex: 1;
    width: 100%;
    background: #151515;
    border: 1px solid #e8c27a33;
    border-radius: 6px;
    color: #ccc;
    font-family: 'Meiryo UI', 'メイリオ', sans-serif;
    font-size: 13px;
    line-height: 1.8;
    padding: 14px;
    outline: none;
    resize: none;
  }
  #editor:focus { border-color: #e8c27a88; }

  /* Horizontal splitter */
  .splitter {
    width: 10px;
    cursor: col-resize;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    align-self: center;
    user-select: none;
  }
  .splitter::after {
    content: '';
    display: block;
    width: 2px;
    height: 48px;
    background: #2a2a2a;
    border-radius: 2px;
    transition: background 0.15s;
  }
  .splitter:hover::after, .splitter.dragging::after { background: #e8c27a; }

  #preview {
    flex: 1;
    background: #fdf5e0;
    border: 1px solid #a8c8e855;
    border-radius: 6px;
    padding: 14px;
    overflow-y: auto;
    line-height: 1.8;
    font-size: 13px;
  }

  /* Vertical resize handle */
  .resize-handle {
    width: 100%; max-width: 1600px;
    height: 12px;
    cursor: ns-resize;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-top: 2px;
    user-select: none;
  }
  .resize-handle::after {
    content: '';
    display: block;
    width: 48px; height: 3px;
    background: #2a2a2a;
    border-radius: 2px;
    transition: background 0.15s;
  }
  .resize-handle:hover::after, .resize-handle.dragging::after { background: #e8c27a; }

  .preview-line { display: flex; gap: 8px; margin-bottom: 2px; }
  .speaker { font-weight: bold; min-width: 28px; flex-shrink: 0; }
  .speaker.speaker-a { color: #c0392b; }
  .speaker.speaker-b { color: #2878b8; }
  .speaker.question { color: #7060b0; }
  .plain-line { color: #999; min-height: 22px; }

  #btn-copy.copied { border-color: #a8d8a8; color: #a8d8a8; }
</style>
</head>
<body>

<div class="toolbar">
  <div class="btn-wrap">
    <button id="btn-underline" onclick="applyFormat('_','_')">U</button>
    <span class="shortcut-hint">Ctrl+U</span>
  </div>
  <div class="btn-wrap">
    <button id="btn-bold" onclick="applyFormat('(',')')">B</button>
    <span class="shortcut-hint">Ctrl+B</span>
  </div>
  <div class="btn-wrap">
    <button id="btn-gray" onclick="applyFormat('++','++')">G</button>
    <span class="shortcut-hint">Ctrl+G</span>
  </div>
  <div class="btn-wrap">
    <button id="btn-question" onclick="toggleQuestion()">A?</button>
    <span class="shortcut-hint">Ctrl+Q</span>
  </div>

  <div class="divider"></div>

  <div class="btn-wrap">
    <button id="btn-speaker-a" onclick="addSpeaker('A')">A:</button>
    <span class="shortcut-hint">Ctrl+1</span>
  </div>
  <div class="btn-wrap">
    <button id="btn-speaker-b" onclick="addSpeaker('B')">B:</button>
    <span class="shortcut-hint">Ctrl+2</span>
  </div>

  <div class="divider"></div>

  <div class="btn-wrap">
    <button id="btn-undo" onclick="undo()" disabled>↩</button>
    <span class="shortcut-hint">Ctrl+Z</span>
  </div>
  <div class="btn-wrap">
    <button id="btn-redo" onclick="redo()" disabled>↪</button>
    <span class="shortcut-hint">Ctrl+Y</span>
  </div>

  <div class="divider"></div>

  <div class="btn-wrap">
    <button id="btn-copy" onclick="copyOutput()">Copy</button>
    <span class="shortcut-hint">&nbsp;</span>
  </div>

</div>

<div class="panes-wrapper" id="panesWrapper">
  <div class="pane" id="paneLeft">
    <div class="pane-label">Edit</div>
    <textarea id="editor" oninput="onInput()"></textarea>
  </div>
  <div class="splitter" id="splitter"></div>
  <div class="pane" id="paneRight">
    <div class="pane-label">Preview</div>
    <div id="preview"></div>
  </div>
</div>
<div class="resize-handle" id="resizeHandle"></div>



<script>
const editor = document.getElementById('editor');
const preview = document.getElementById('preview');
const btnUndo = document.getElementById('btn-undo');
const btnRedo = document.getElementById('btn-redo');
const wrapper = document.getElementById('panesWrapper');
const paneLeft = document.getElementById('paneLeft');
const paneRight = document.getElementById('paneRight');
const splitter = document.getElementById('splitter');
const resizeHandle = document.getElementById('resizeHandle');

// ── Vertical resize ────────────────────────────────────────────
let vDragging = false, vStartY, vStartH;
resizeHandle.addEventListener('mousedown', e => {
  vDragging = true;
  vStartY = e.clientY;
  vStartH = wrapper.offsetHeight;
  resizeHandle.classList.add('dragging');
  e.preventDefault();
});
document.addEventListener('mousemove', e => {
  if (!vDragging) return;
  const h = Math.max(120, vStartH + (e.clientY - vStartY));
  wrapper.style.height = h + 'px';
});
document.addEventListener('mouseup', () => {
  vDragging = false;
  resizeHandle.classList.remove('dragging');
});

// ── Horizontal resize (splitter) ──────────────────────────────
// Initialize 50/50 split
paneLeft.style.flex = 'none';
paneRight.style.flex = 'none';
function initSplit() {
  const total = wrapper.offsetWidth - splitter.offsetWidth;
  paneLeft.style.width = (total / 2) + 'px';
  paneRight.style.width = (total / 2) + 'px';
}
initSplit();

let hDragging = false, hStartX, hLeftW;
splitter.addEventListener('mousedown', e => {
  hDragging = true;
  hStartX = e.clientX;
  hLeftW = paneLeft.offsetWidth;
  splitter.classList.add('dragging');
  e.preventDefault();
});
document.addEventListener('mousemove', e => {
  if (!hDragging) return;
  const total = wrapper.offsetWidth - splitter.offsetWidth;
  const newW = Math.max(80, Math.min(total - 80, hLeftW + (e.clientX - hStartX)));
  paneLeft.style.width = newW + 'px';
  paneRight.style.width = (total - newW) + 'px';
});
document.addEventListener('mouseup', () => {
  hDragging = false;
  splitter.classList.remove('dragging');
});

// ── Undo/Redo ─────────────────────────────────────────────────
let history = [{ value: '', selStart: 0, selEnd: 0 }];
let histIndex = 0;
let isUndoRedo = false;

function saveHistory() {
  history = history.slice(0, histIndex + 1);
  history.push({ value: editor.value, selStart: editor.selectionStart, selEnd: editor.selectionEnd });
  if (history.length > 200) history.shift();
  histIndex = history.length - 1;
  updateUndoRedoBtns();
}

function undo() {
  if (histIndex <= 0) return;
  histIndex--;
  isUndoRedo = true;
  const s = history[histIndex];
  editor.value = s.value;
  editor.setSelectionRange(s.selStart, s.selEnd);
  editor.focus();
  isUndoRedo = false;
  updatePreview();
  updateUndoRedoBtns();
}

function redo() {
  if (histIndex >= history.length - 1) return;
  histIndex++;
  isUndoRedo = true;
  const s = history[histIndex];
  editor.value = s.value;
  editor.setSelectionRange(s.selStart, s.selEnd);
  editor.focus();
  isUndoRedo = false;
  updatePreview();
  updateUndoRedoBtns();
}

function updateUndoRedoBtns() {
  btnUndo.disabled = histIndex <= 0;
  btnRedo.disabled = histIndex >= history.length - 1;
}

let inputTimer = null;
function onInput() {
  updatePreview();
  if (isUndoRedo) return;
  clearTimeout(inputTimer);
  inputTimer = setTimeout(saveHistory, 600);
}

// ── Format helpers ─────────────────────────────────────────────
function applyFormat(open, close) {
  const start = editor.selectionStart;
  const end = editor.selectionEnd;
  if (start === end) return;
  const val = editor.value;
  editor.value = val.slice(0, start) + open + val.slice(start, end) + close + val.slice(end);
  const newPos = end + open.length + close.length;
  editor.focus();
  editor.setSelectionRange(newPos, newPos);
  saveHistory();
  updatePreview();
}

function toggleQuestion() {
  const pos = editor.selectionStart;
  const val = editor.value;
  const lineStart = val.lastIndexOf('\n', pos - 1) + 1;
  const lineEndRaw = val.indexOf('\n', pos);
  const lineEnd = lineEndRaw === -1 ? val.length : lineEndRaw;
  const line = val.slice(lineStart, lineEnd);
  const match = line.match(/^([A-Z])(\?)?:/);
  if (!match) return;
  const newLine = match[2]
    ? line[0] + ':' + line.slice(3)
    : line[0] + '?:' + line.slice(2);
  editor.value = val.slice(0, lineStart) + newLine + val.slice(lineEnd);
  const offset = match[2] ? -1 : 1;
  editor.focus();
  editor.setSelectionRange(pos + offset, pos + offset);
  saveHistory();
  updatePreview();
}

function addSpeaker(label) {
  const pos = editor.selectionStart;
  const val = editor.value;
  const lineStart = val.lastIndexOf('\n', pos - 1) + 1;
  const lineEndRaw = val.indexOf('\n', pos);
  const lineEnd = lineEndRaw === -1 ? val.length : lineEndRaw;
  const line = val.slice(lineStart, lineEnd);
  const newLine = line.match(/^[A-Z]\??:/)
    ? label + ':' + line.slice(line.indexOf(':') + 1)
    : label + ': ' + line;
  editor.value = val.slice(0, lineStart) + newLine + val.slice(lineEnd);
  editor.focus();
  editor.setSelectionRange(lineStart + newLine.length, lineStart + newLine.length);
  saveHistory();
  updatePreview();
}

// ── Keyboard shortcuts ─────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (!e.ctrlKey && !e.metaKey) return;
  const key = e.key.toLowerCase();
  if (key === 'z') { e.preventDefault(); undo(); return; }
  if (key === 'y') { e.preventDefault(); redo(); return; }
  if (document.activeElement !== editor) return;
  if (key === 'u') { e.preventDefault(); applyFormat('_', '_'); }
  if (key === 'b') { e.preventDefault(); applyFormat('(', ')'); }
  if (key === 'g') { e.preventDefault(); applyFormat('++', '++'); }
  if (key === 'q') { e.preventDefault(); toggleQuestion(); }
  if (key === '1') { e.preventDefault(); addSpeaker('A'); }
  if (key === '2') { e.preventDefault(); addSpeaker('B'); }
});

// ── Preview renderer ───────────────────────────────────────────
function parseTokens(text) {
  const tokens = [];
  let i = 0;
  while (i < text.length) {
    if (text[i] === '_') {
      const end = text.indexOf('_', i + 1);
      if (end !== -1) { tokens.push({ type: 'underline', text: text.slice(i+1, end) }); i = end+1; continue; }
    }
    if (text.slice(i, i+2) === '++') {
      const end = text.indexOf('++', i+2);
      if (end !== -1) { tokens.push({ type: 'gray', text: text.slice(i+2, end) }); i = end+2; continue; }
    }
    if (text[i] === '(') {
      const end = text.indexOf(')', i+1);
      if (end !== -1) { tokens.push({ type: 'bold', text: text.slice(i+1, end) }); i = end+1; continue; }
    }
    if (tokens.length && tokens[tokens.length-1].type === 'plain') {
      tokens[tokens.length-1].text += text[i];
    } else {
      tokens.push({ type: 'plain', text: text[i] });
    }
    i++;
  }
  return tokens;
}

function makeSpan(text, styles) {
  const esc = text.replace(/&/g, '&amp;').replace(/</g, '&lt;');
  let style = '';
  if (styles.gray) {
    style = 'color:#bbb;font-style:italic;';
  } else {
    style = styles.underline
      ? 'text-decoration:underline;text-underline-offset:3px;text-decoration-color:#000;color:#111;'
      : 'color:#222;';
  }
  if (styles.bold) style += 'font-weight:bold;font-size:1.1em;';
  return `<span style="${style}">${esc}</span>`;
}

function renderSegment(text, styles) {
  const html = [];
  let i = 0, last = 0;
  while (i < text.length) {
    if (!styles.bold && text[i] === '(') {
      const end = text.indexOf(')', i + 1);
      if (end !== -1) {
        if (i > last) html.push(makeSpan(text.slice(last, i), styles));
        html.push(makeSpan(text.slice(i + 1, end), { ...styles, bold: true }));
        last = end + 1; i = end + 1; continue;
      }
    }
    if (!styles.underline && text[i] === '_') {
      const end = text.indexOf('_', i + 1);
      if (end !== -1) {
        if (i > last) html.push(makeSpan(text.slice(last, i), styles));
        html.push(makeSpan(text.slice(i + 1, end), { ...styles, underline: true }));
        last = end + 1; i = end + 1; continue;
      }
    }
    i++;
  }
  if (last < text.length) html.push(makeSpan(text.slice(last), styles));
  return html.join('');
}

function styledSpan(text, underline, bold, gray) {
  return makeSpan(text, { underline, bold, gray });
}

function renderTokens(tokens) {
  return tokens.map(t => {
    if (t.type === 'underline') return renderSegment(t.text, { underline: true,  bold: false, gray: false });
    if (t.type === 'gray')      return renderSegment(t.text, { underline: false, bold: false, gray: true  });
    if (t.type === 'bold')      return renderSegment(t.text, { underline: false, bold: true,  gray: false });
    return renderSegment(t.text, { underline: false, bold: false, gray: false });
  }).join('');
}

function visualizeSpaces(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;');
}

function updatePreview() {
  const lines = editor.value.split('\n');
  const lastIdx = lines.length - 1;
  let prevSpeaker = null;
  preview.innerHTML = lines.map((line, idx) => {
    const nl = idx < lastIdx
      ? '<span style="color:#c8b8e8;font-size:11px;user-select:none">↵</span>'
      : '';
    const m = line.match(/^([A-Z]\??):(.*)$/);
    if (!m) {
      prevSpeaker = null;
      return `<div class="plain-line">${renderTokens(parseTokens(line))}${nl}</div>`;
    }
    const [, speaker, rest] = m;
    const letter = speaker.replace('?', '');
    const isQ = speaker.includes('?');
    const speakerClass = `speaker speaker-${letter.toLowerCase()} ${isQ ? 'question' : ''}`;
    const divider = prevSpeaker !== null && prevSpeaker !== letter
      ? '<div style="border-top:1px solid #ddd;margin:4px 0;"></div>'
      : '';
    prevSpeaker = letter;
    return `${divider}<div class="preview-line">
      <span class="${speakerClass}">${speaker}:</span>
      <span>${renderTokens(parseTokens(rest))}${nl}</span>
    </div>`;
  }).join('');
}

// ── Copy ──────────────────────────────────────────────────────
function copyOutput() {
  const text = editor.value;
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(showCopied).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const tmp = document.createElement('textarea');
  tmp.value = text;
  tmp.style.position = 'fixed';
  tmp.style.opacity = '0';
  document.body.appendChild(tmp);
  tmp.focus();
  tmp.select();
  try { document.execCommand('copy'); showCopied(); } catch(e) {}
  document.body.removeChild(tmp);
}

function showCopied() {
  const btn = document.getElementById('btn-copy');
  btn.textContent = 'Copied ✓';
  btn.classList.add('copied');
  setTimeout(() => { btn.textContent = 'Copy output'; btn.classList.remove('copied'); }, 2000);
}

updatePreview();
updateUndoRedoBtns();
</script>
</body>
</html>
