<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anki Manual Formatter</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #111;
    font-family: 'Meiryo UI', 'メイリオ', sans-serif;
    color: #ccc;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 12px 20px;
  }

  .toolbar {
    width: 100%;
    display: flex; gap: 8px; margin-bottom: 12px;
    flex-wrap: wrap; align-items: center;
    position: sticky; top: 0; z-index: 100;
    background: #111;
    padding: 10px 0 10px;
  }

  button {
    background: #1c1c1c;
    border: 1px solid #2a2a2a;
    color: #bbb;
    font-family: 'Meiryo UI', 'メイリオ', sans-serif;
    font-size: 13px;
    padding: 6px 16px;
    border-radius: 4px;
    cursor: pointer;
    transition: border-color 0.15s, opacity 0.15s;
  }
  button:hover:not(:disabled) { border-color: #e8c27a; }
  button:disabled { opacity: 0.3; cursor: default; }

  #btn-underline { text-decoration: underline; }
  #btn-bold { font-weight: bold; }
  #btn-gray { color: #666; }
  #btn-question { color: #c0a8e8; }
  #btn-question:hover:not(:disabled) { border-color: #c0a8e8; }
  #btn-speaker-a { color: #c0392b; }
  #btn-speaker-b { color: #a8c8e8; }
  #btn-copyall { color: #5898c8; border-color: #5898c844; }
  #btn-copyall:hover:not(:disabled) { border-color: #5898c8; }
  #btn-delete { color: #c85858; border-color: #c8585844; }
  #btn-delete:hover:not(:disabled) { border-color: #c85858; }
  #btn-deleteall { color: #c85858; border-color: #c8585844; }
  #btn-deleteall:hover:not(:disabled) { border-color: #c85858; }

  .divider { width: 1px; height: 24px; background: #2a2a2a; margin: 0 4px; }
  .btn-wrap { display: flex; flex-direction: column; align-items: center; }
  .shortcut-hint { font-size: 9px; color: #444; display: block; text-align: center; margin-top: 2px; }

  /* Cards list */
  .cards-list {
    width: 100%; max-width: 1600px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  /* Wrapper: index label + card row side by side */
  .card-wrap {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 10px;
  }
  .card-index {
    font-size: 11px;
    color: #333;
    letter-spacing: 1px;
    min-width: 24px;
    text-align: right;
    padding-top: 10px;
    user-select: none;
    flex-shrink: 0;
  }

  .card-row {
    display: flex;
    gap: 0;
    height: 260px;
    min-height: 120px;
    align-items: flex-start;
    border: 1px solid #e8c27a22;
    border-radius: 6px;
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .card-row.focused { border-color: #e8c27a55; }

  .card-pane { display: flex; flex-direction: column; min-width: 80px; flex: 1; height: 100%; }

  /* Editor = transparent textarea on top of styled overlay */
  .editor-container {
    position: relative;
    flex: 1;
    overflow: hidden;
    background: #151515;
  }
  .card-editor {
    position: absolute;
    inset: 0;
    background: transparent;
    color: transparent;
    caret-color: #c8c8c8;
    border: none;
    font-family: 'Meiryo UI', 'メイリオ', sans-serif;
    font-size: 13px;
    line-height: 1.8;
    padding: 14px;
    outline: none;
    resize: none;
    z-index: 2;
    overflow-y: auto;
    overflow-x: hidden;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .card-editor-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    font-family: 'Meiryo UI', 'メイリオ', sans-serif;
    font-size: 13px;
    line-height: 1.8;
    padding: 14px;
    white-space: pre-wrap;
    word-break: break-word;
    overflow: hidden;
    color: #ccc;
  }

  .card-splitter {
    width: 10px;
    cursor: col-resize;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    align-self: stretch;
    user-select: none;
    background: #131313;
  }
  .card-splitter::after {
    content: '';
    display: block;
    width: 2px;
    height: 48px;
    background: #2a2a2a;
    border-radius: 2px;
    transition: background 0.15s;
  }
  .card-splitter:hover::after, .card-splitter.dragging::after { background: #e8c27a; }

  .card-preview {
    flex: 1;
    background: #fdf5e0;
    padding: 14px;
    overflow-y: auto;
    line-height: 1.8;
    font-size: 13px;
    height: 100%;
  }

  .card-resize {
    width: 100%; max-width: 1600px;
    height: 10px;
    cursor: ns-resize;
    display: flex;
    justify-content: center;
    align-items: center;
    user-select: none;
  }
  .card-resize::after {
    content: '';
    display: block;
    width: 48px; height: 3px;
    background: #1e1e1e;
    border-radius: 2px;
    transition: background 0.15s;
  }
  .card-resize:hover::after, .card-resize.dragging::after { background: #e8c27a; }

  .preview-line { display: flex; gap: 8px; margin-bottom: 2px; }
  .speaker { font-weight: bold; min-width: 28px; flex-shrink: 0; }
  .speaker.speaker-a { color: #c0392b; }
  .speaker.speaker-b { color: #2878b8; }
  .speaker.question { color: #7060b0; }
  .plain-line { color: #999; min-height: 22px; }

  .btn-flashed { border-color: #a8d8a8 !important; color: #a8d8a8 !important; }
  .btn-flashed-blue { border-color: #a8c8e8 !important; color: #a8c8e8 !important; }
</style>
</head>
<body>

<div class="toolbar">
  <div class="btn-wrap">
    <button id="btn-underline" onclick="applyFormat('_','_')">U</button>
    <span class="shortcut-hint">Ctrl+U</span>
  </div>
  <div class="btn-wrap">
    <button id="btn-bold" onclick="applyFormat('(',')')">B</button>
    <span class="shortcut-hint">Ctrl+B</span>
  </div>
  <div class="btn-wrap">
    <button id="btn-gray" onclick="applyFormat('++','++')">G</button>
    <span class="shortcut-hint">Ctrl+G</span>
  </div>
  <div class="btn-wrap">
    <button id="btn-question" onclick="toggleQuestion()">A?</button>
    <span class="shortcut-hint">Ctrl+Q</span>
  </div>

  <div class="divider"></div>

  <div class="btn-wrap">
    <button id="btn-speaker-a" onclick="addSpeaker('A')">A:</button>
    <span class="shortcut-hint">Ctrl+1</span>
  </div>
  <div class="btn-wrap">
    <button id="btn-speaker-b" onclick="addSpeaker('B')">B:</button>
    <span class="shortcut-hint">Ctrl+2</span>
  </div>

  <div class="divider"></div>

  <div class="btn-wrap">
    <button id="btn-undo" onclick="undo()" disabled>↩</button>
    <span class="shortcut-hint">Ctrl+Z</span>
  </div>
  <div class="btn-wrap">
    <button id="btn-redo" onclick="redo()" disabled>↪</button>
    <span class="shortcut-hint">Ctrl+Y</span>
  </div>

  <div class="divider"></div>

  <div class="btn-wrap">
    <button id="btn-copy" onclick="copyOutput()">Copy</button>
    <span class="shortcut-hint">&nbsp;</span>
  </div>
  <div class="btn-wrap">
    <button id="btn-copyall" onclick="copyAll()">Copy All</button>
    <span class="shortcut-hint">&nbsp;</span>
  </div>

  <div class="divider"></div>

  <div class="btn-wrap">
    <button id="btn-clear" onclick="clearFormatting()" style="color:#c8a050;">Clear</button>
    <span class="shortcut-hint">&nbsp;</span>
  </div>
  <div class="btn-wrap">
    <button id="btn-clearall" onclick="clearAll()" style="color:#c8a050;">Clear All</button>
    <span class="shortcut-hint">&nbsp;</span>
  </div>

  <div class="divider"></div>

  <div class="btn-wrap">
    <button id="btn-delete" onclick="deleteCard()">Delete</button>
    <span class="shortcut-hint">&nbsp;</span>
  </div>
  <div class="btn-wrap">
    <button id="btn-deleteall" onclick="deleteAll()">Delete All</button>
    <span class="shortcut-hint">&nbsp;</span>
  </div>
</div>

<div class="cards-list" id="cardsList"></div>

<script>
// ── State ──────────────────────────────────────────────────────
let cards = [{ id: 1, value: '' }];
let nextId = 2;
let focusedId = 1;

// Per-card undo/redo history
const histories = {};

function getHist(id) {
  if (!histories[id]) histories[id] = { stack: [{ value: '', selStart: 0, selEnd: 0 }], index: 0 };
  return histories[id];
}

// Initialize history for a card with its actual starting content
function initHist(id, value) {
  histories[id] = { stack: [{ value: value, selStart: 0, selEnd: 0 }], index: 0 };
}

function saveHistory(id, value, selStart, selEnd) {
  const h = getHist(id);
  // Don't push duplicate
  const cur = h.stack[h.index];
  if (cur && cur.value === value) { updateUndoRedoBtns(); return; }
  h.stack = h.stack.slice(0, h.index + 1);
  h.stack.push({ value, selStart, selEnd });
  if (h.stack.length > 200) h.stack.shift();
  h.index = h.stack.length - 1;
  updateUndoRedoBtns();
}

function undo() {
  const h = getHist(focusedId);
  if (h.index > 0) {
    // Text-level undo within the focused card
    h.index--;
    restoreHistory(focusedId, h.stack[h.index]);
  } else if (deletedStack.length > 0) {
    // Structural undo: restore cards deleted by Delete / Delete All
    const snap = deletedStack.pop();
    cards = snap.cards;
    focusedId = snap.focusedId;
    // histories for the restored card ids are still intact in the histories object
    render();
    requestAnimationFrame(() => {
      const ed = getEditor(focusedId);
      if (ed) ed.focus();
      updateUndoRedoBtns();
    });
  }
}

function redo() {
  const h = getHist(focusedId);
  if (h.index >= h.stack.length - 1) return;
  h.index++;
  restoreHistory(focusedId, h.stack[h.index]);
}

function restoreHistory(id, state) {
  const ed = getEditor(id); if (!ed) return;
  ed.value = state.value;
  ed.setSelectionRange(state.selStart, state.selEnd);
  ed.focus();
  const card = cards.find(c => c.id === id);
  if (card) card.value = state.value;
  updateOverlay(id);
  updatePreview(id);
  updateUndoRedoBtns();
}

function updateUndoRedoBtns() {
  const h = getHist(focusedId);
  document.getElementById('btn-undo').disabled = h.index <= 0 && deletedStack.length === 0;
  document.getElementById('btn-redo').disabled = h.index >= h.stack.length - 1;
}

// Debounced save on free typing
const inputTimers = {};
function onInput(id) {
  const ed = getEditor(id); if (!ed) return;
  const card = cards.find(c => c.id === id);
  if (card) card.value = ed.value;
  updateOverlay(id);
  updatePreview(id);
  clearTimeout(inputTimers[id]);
  inputTimers[id] = setTimeout(() => {
    const ed2 = getEditor(id); if (!ed2) return;
    saveHistory(id, ed2.value, ed2.selectionStart, ed2.selectionEnd);
  }, 600);
}

// ── Editor overlay renderer ────────────────────────────────────
function escH(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderOverlayInline(text) {
  let html = '', i = 0;
  const mk = 'color:#c8a050;'; // marker color (amber)
  while (i < text.length) {
    if (text[i] === '_') {
      const end = text.indexOf('_', i + 1);
      if (end !== -1) {
        html += '<span style="' + mk + '">_</span>';
        html += renderOverlayInline(text.slice(i+1, end));
        html += '<span style="' + mk + '">_</span>';
        i = end + 1; continue;
      }
    }
    if (text.slice(i,i+2) === '++') {
      const end = text.indexOf('++', i + 2);
      if (end !== -1) {
        html += '<span style="' + mk + '">++</span>';
        html += escH(text.slice(i+2, end));
        html += '<span style="' + mk + '">++</span>';
        i = end + 2; continue;
      }
    }
    if (text[i] === '(') {
      const end = text.indexOf(')', i + 1);
      if (end !== -1) {
        html += '<span style="' + mk + '">(</span>';
        html += renderOverlayInline(text.slice(i+1, end));
        html += '<span style="' + mk + '">)</span>';
        i = end + 1; continue;
      }
    }
    html += escH(text[i]); i++;
  }
  return html;
}

function renderOverlayLine(line) {
  const m = line.match(/^([A-Z])(\??):(.*)$/);
  if (m) {
    const baseColor = m[1] === 'A' ? '#c04040' : m[1] === 'B' ? '#4888c0' : '#aaa';
    const labelColor = m[2] === '?' ? '#8868c0' : baseColor;
    return '<span style="color:' + labelColor + ';">' + escH(m[1] + m[2] + ':') + '</span>' + renderOverlayInline(m[3]);
  }
  return renderOverlayInline(line);
}

function updateOverlay(id) {
  const card = cards.find(c => c.id === id);
  const el = document.getElementById('ov-' + id);
  if (!card || !el) return;
  el.innerHTML = card.value.split('\n').map(line =>
    '<div style="min-height:1.8em;">' + (renderOverlayLine(line) || '\u200b') + '</div>'
  ).join('');
  const ed = getEditor(id);
  if (ed) el.scrollTop = ed.scrollTop;
}

// ── Helpers ────────────────────────────────────────────────────
function getEditor(id) { return document.getElementById('ed-' + id); }
function getFocusedEditor() { return getEditor(focusedId); }

// ── Format functions (original logic) ─────────────────────────
function hasMarkerPair(text, open, close) {
  if (open === close) return (text.split(open).length - 1) >= 2;
  return text.includes(open) && text.includes(close);
}
function stripMarkers(text, open, close) {
  let r = text.split(open).join('');
  if (open !== close) r = r.split(close).join('');
  return r;
}

function applyFormat(open, close) {
  const ed = getFocusedEditor(); if (!ed) return;
  const start = ed.selectionStart, end = ed.selectionEnd;
  if (start === end) return;
  const val = ed.value, sel = val.slice(start, end);
  if (hasMarkerPair(sel, open, close)) {
    const stripped = stripMarkers(sel, open, close);
    ed.value = val.slice(0, start) + stripped + val.slice(end);
    ed.focus(); ed.setSelectionRange(start, start + stripped.length);
  } else {
    ed.value = val.slice(0, start) + open + sel + close + val.slice(end);
    ed.focus(); ed.setSelectionRange(start, end + open.length + close.length);
  }
  const card = cards.find(c => c.id === focusedId);
  if (card) card.value = ed.value;
  saveHistory(focusedId, ed.value, ed.selectionStart, ed.selectionEnd);
  updateOverlay(focusedId);
  updatePreview(focusedId);
}

function toggleQuestion() {
  const ed = getFocusedEditor(); if (!ed) return;
  const pos = ed.selectionStart, val = ed.value;
  const ls = val.lastIndexOf('\n', pos - 1) + 1;
  const leRaw = val.indexOf('\n', pos);
  const le = leRaw === -1 ? val.length : leRaw;
  const line = val.slice(ls, le);
  const match = line.match(/^([A-Z])(\?)?:/);
  if (!match) return;
  const newLine = match[2] ? line[0] + ':' + line.slice(3) : line[0] + '?:' + line.slice(2);
  ed.value = val.slice(0, ls) + newLine + val.slice(le);
  const offset = match[2] ? -1 : 1;
  ed.focus(); ed.setSelectionRange(pos + offset, pos + offset);
  const card = cards.find(c => c.id === focusedId);
  if (card) card.value = ed.value;
  saveHistory(focusedId, ed.value, ed.selectionStart, ed.selectionEnd);
  updateOverlay(focusedId);
  updatePreview(focusedId);
}

function addSpeaker(label) {
  const ed = getFocusedEditor(); if (!ed) return;
  const pos = ed.selectionStart, val = ed.value;
  const ls = val.lastIndexOf('\n', pos - 1) + 1;
  const leRaw = val.indexOf('\n', pos);
  const le = leRaw === -1 ? val.length : leRaw;
  const line = val.slice(ls, le);
  const newLine = line.match(/^[A-Z]\??:/)
    ? label + ':' + line.slice(line.indexOf(':') + 1)
    : label + ': ' + line;
  ed.value = val.slice(0, ls) + newLine + val.slice(le);
  ed.focus(); ed.setSelectionRange(ls + newLine.length, ls + newLine.length);
  const card = cards.find(c => c.id === focusedId);
  if (card) card.value = ed.value;
  saveHistory(focusedId, ed.value, ed.selectionStart, ed.selectionEnd);
  updateOverlay(focusedId);
  updatePreview(focusedId);
}

function clearFormatting() {
  const ed = getFocusedEditor(); if (!ed) return;
  // Save the CURRENT state to history BEFORE clearing, so Ctrl+Z can restore it
  saveHistory(focusedId, ed.value, ed.selectionStart, ed.selectionEnd);
  const cleared = ed.value.split('\n').map(line => {
    const m = line.match(/^([A-Z])(\??)(:)(.*)/);
    const prefix = m ? m[1] + m[3] : '';
    const content = m ? m[4] : line;
    return prefix + content.split('_').join('').split('(').join('').split(')').join('');
  });
  ed.value = cleared.join('\n');
  const card = cards.find(c => c.id === focusedId);
  if (card) card.value = ed.value;
  saveHistory(focusedId, ed.value, ed.selectionStart, ed.selectionEnd);
  updateOverlay(focusedId);
  updatePreview(focusedId);
}

// ── Copy / Copy All ────────────────────────────────────────────
function doCopy(text, btnId, label) {
  const btn = document.getElementById(btnId);
  const doExec = () => {
    const tmp = document.createElement('textarea');
    tmp.value = text; tmp.style.cssText = 'position:fixed;opacity:0;top:0;left:0;';
    document.body.appendChild(tmp); tmp.focus(); tmp.select();
    try { document.execCommand('copy'); flash(btn, label); } catch(e) {}
    document.body.removeChild(tmp);
  };
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(() => flash(btn, label)).catch(doExec);
  } else { doExec(); }
}

function flash(btn, label) {
  const orig = btn.textContent;
  btn.textContent = label;
  btn.classList.add('btn-flashed');
  setTimeout(() => { btn.textContent = orig; btn.classList.remove('btn-flashed'); }, 2000);
}

function copyOutput() {
  const ed = getFocusedEditor(); if (!ed) return;
  // Wrap in Excel single-cell quotes so newlines stay in one cell on paste
  const singleCell = '"' + ed.value.replace(/"/g, '""') + '"';
  doCopy(singleCell, 'btn-copy', 'Copied ✓');
}

function copyAll() {
  // Each card = one Excel row (quoted if contains newlines)
  const tsv = cards.map(c => {
    const v = c.value;
    if (v.includes('\n') || v.includes('\t') || v.includes('"')) return '"' + v.replace(/"/g, '""') + '"';
    return v;
  }).join('\r\n');
  const btn = document.getElementById('btn-copyall');
  const doExec = () => {
    const tmp = document.createElement('textarea');
    tmp.value = tsv; tmp.style.cssText = 'position:fixed;opacity:0;top:0;left:0;';
    document.body.appendChild(tmp); tmp.focus(); tmp.select();
    try { document.execCommand('copy'); flashBlue(btn); } catch(e) {}
    document.body.removeChild(tmp);
  };
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(tsv).then(() => flashBlue(btn)).catch(doExec);
  } else { doExec(); }
}

function flashBlue(btn) {
  const orig = btn.textContent;
  btn.textContent = 'Copied ✓';
  btn.classList.add('btn-flashed-blue');
  setTimeout(() => { btn.textContent = orig; btn.classList.remove('btn-flashed-blue'); }, 2000);
}

// ── Excel TSV parse ────────────────────────────────────────────
function parseExcelTSV(text) {
  const results = [];
  let i = 0, n = text.length;
  while (i < n) {
    let field = '';
    if (text[i] === '"') {
      i++;
      while (i < n) {
        if (text[i] === '"') {
          if (i + 1 < n && text[i+1] === '"') { field += '"'; i += 2; }
          else { i++; break; }
        } else { field += text[i++]; }
      }
    } else {
      while (i < n && text[i] !== '\t' && text[i] !== '\r' && text[i] !== '\n') field += text[i++];
    }
    results.push(field);
    if (i < n && text[i] === '\t') { while (i < n && text[i] !== '\r' && text[i] !== '\n') i++; }
    if (i < n && text[i] === '\r') i++;
    if (i < n && text[i] === '\n') i++;
  }
  return results;
}

// ── Paste handler ──────────────────────────────────────────────
function handlePaste(e, cardId) {
  const text = e.clipboardData.getData('text');
  const cells = parseExcelTSV(text);

  if (cells.length <= 1) {
    // Normal paste — save history after browser inserts text
    setTimeout(() => {
      const ed = getEditor(cardId); if (!ed) return;
      const card = cards.find(c => c.id === cardId);
      if (card) card.value = ed.value;
      updatePreview(cardId);
      saveHistory(cardId, ed.value, ed.selectionStart, ed.selectionEnd);
    }, 0);
    return;
  }

  // Multiple cells → split into cards
  e.preventDefault();
  const ed = e.target;
  const before = ed.value.slice(0, ed.selectionStart);
  const after  = ed.value.slice(ed.selectionEnd);

  const idx = cards.findIndex(c => c.id === cardId);
  const firstValue = before + cells[0] + after;
  cards[idx].value = firstValue;
  // Save current card's new value as initial history point
  saveHistory(cardId, firstValue, firstValue.length, firstValue.length);

  const newCards = cells.slice(1).map(v => ({ id: nextId++, value: v }));
  cards.splice(idx + 1, 0, ...newCards);

  // Initialize history for each new card with its actual content
  // so Ctrl+Z doesn't wipe back to empty
  newCards.forEach(c => initHist(c.id, c.value));

  focusedId = newCards.length > 0 ? newCards[newCards.length - 1].id : cardId;
  render();
  requestAnimationFrame(() => {
    const last = getEditor(focusedId);
    if (last) { last.focus(); last.scrollIntoView({ block: 'nearest' }); }
  });
}

// ── Preview renderer (original logic) ─────────────────────────
function parseTokens(text) {
  const tokens = [];
  let i = 0;
  while (i < text.length) {
    if (text[i] === '_') {
      const end = text.indexOf('_', i + 1);
      if (end !== -1) { tokens.push({ type: 'underline', text: text.slice(i+1, end) }); i = end+1; continue; }
    }
    if (text.slice(i, i+2) === '++') {
      const end = text.indexOf('++', i+2);
      if (end !== -1) { tokens.push({ type: 'gray', text: text.slice(i+2, end) }); i = end+2; continue; }
    }
    if (text[i] === '(') {
      const end = text.indexOf(')', i+1);
      if (end !== -1) { tokens.push({ type: 'bold', text: text.slice(i+1, end) }); i = end+1; continue; }
    }
    if (tokens.length && tokens[tokens.length-1].type === 'plain') tokens[tokens.length-1].text += text[i];
    else tokens.push({ type: 'plain', text: text[i] });
    i++;
  }
  return tokens;
}

function makeSpan(text, styles) {
  const esc = text.replace(/&/g, '&amp;').replace(/</g, '&lt;');
  let style = '';
  if (styles.gray) style = 'color:#bbb;font-style:italic;';
  else style = styles.underline ? 'text-decoration:underline;text-underline-offset:3px;text-decoration-color:#000;color:#111;' : 'color:#222;';
  if (styles.bold) style += 'font-weight:bold;font-size:1.1em;';
  return `<span style="${style}">${esc}</span>`;
}

function renderSegment(text, styles) {
  const html = []; let i = 0, last = 0;
  while (i < text.length) {
    if (!styles.bold && text[i] === '(') {
      const end = text.indexOf(')', i + 1);
      if (end !== -1) {
        if (i > last) html.push(makeSpan(text.slice(last, i), styles));
        html.push(makeSpan(text.slice(i + 1, end), { ...styles, bold: true }));
        last = end + 1; i = end + 1; continue;
      }
    }
    if (!styles.underline && text[i] === '_') {
      const end = text.indexOf('_', i + 1);
      if (end !== -1) {
        if (i > last) html.push(makeSpan(text.slice(last, i), styles));
        html.push(makeSpan(text.slice(i + 1, end), { ...styles, underline: true }));
        last = end + 1; i = end + 1; continue;
      }
    }
    i++;
  }
  if (last < text.length) html.push(makeSpan(text.slice(last), styles));
  return html.join('');
}

function renderTokens(tokens) {
  return tokens.map(t => {
    if (t.type === 'underline') return renderSegment(t.text, { underline: true,  bold: false, gray: false });
    if (t.type === 'gray')      return renderSegment(t.text, { underline: false, bold: false, gray: true  });
    if (t.type === 'bold')      return renderSegment(t.text, { underline: false, bold: true,  gray: false });
    return renderSegment(t.text, { underline: false, bold: false, gray: false });
  }).join('');
}

function updatePreview(id) {
  const card = cards.find(c => c.id === id);
  const pv = document.getElementById('pv-' + id);
  if (!card || !pv) return;
  const lines = card.value.split('\n');
  const lastIdx = lines.length - 1;
  let prevSpeaker = null;
  pv.innerHTML = lines.map((line, idx) => {
    const nl = idx < lastIdx ? '<span style="color:#c8b8e8;font-size:11px;user-select:none">↵</span>' : '';
    const m = line.match(/^([A-Z]\??):(.*)$/);
    if (!m) {
      prevSpeaker = null;
      return `<div class="plain-line">${renderTokens(parseTokens(line))}${nl}</div>`;
    }
    const [, speaker, rest] = m;
    const letter = speaker.replace('?', '');
    const isQ = speaker.includes('?');
    const speakerClass = `speaker speaker-${letter.toLowerCase()} ${isQ ? 'question' : ''}`;
    const divider = prevSpeaker !== null && prevSpeaker !== letter
      ? '<div style="border-top:1px solid #ddd;margin:4px 0;"></div>' : '';
    prevSpeaker = letter;
    return `${divider}<div class="preview-line"><span class="${speakerClass}">${speaker}:</span><span>${renderTokens(parseTokens(rest))}${nl}</span></div>`;
  }).join('');
}

// ── Splitter / Resize setup ────────────────────────────────────
function setupVerticalResize(resizeEl, cardRow) {
  let dragging = false, startY, startH;
  resizeEl.addEventListener('mousedown', e => {
    dragging = true; startY = e.clientY; startH = cardRow.offsetHeight;
    resizeEl.classList.add('dragging'); e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    cardRow.style.height = Math.max(120, startH + (e.clientY - startY)) + 'px';
  });
  document.addEventListener('mouseup', () => { if (dragging) { dragging = false; resizeEl.classList.remove('dragging'); } });
}

function setupHorizontalSplit(splEl, leftPane, rightPane, cardRow) {
  leftPane.style.flex = 'none'; rightPane.style.flex = 'none';
  const init = () => {
    const total = cardRow.offsetWidth - splEl.offsetWidth;
    leftPane.style.width = (total / 2) + 'px';
    rightPane.style.width = (total / 2) + 'px';
  };
  init();
  let dragging = false, startX, leftW;
  splEl.addEventListener('mousedown', e => {
    dragging = true; startX = e.clientX; leftW = leftPane.offsetWidth;
    splEl.classList.add('dragging'); e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const total = cardRow.offsetWidth - splEl.offsetWidth;
    const newW = Math.max(80, Math.min(total - 80, leftW + (e.clientX - startX)));
    leftPane.style.width = newW + 'px';
    rightPane.style.width = (total - newW) + 'px';
  });
  document.addEventListener('mouseup', () => { if (dragging) { dragging = false; splEl.classList.remove('dragging'); } });
}

// ── Clear All ──────────────────────────────────────────────────
function clearAll() {
  // Snapshot all card values before clearing — Ctrl+Z will restore everything at once
  deletedStack.push({ cards: cards.map(c => ({ ...c })), focusedId });
  cards.forEach(card => {
    const cleared = card.value.split('\n').map(line => {
      const m = line.match(/^([A-Z])(\??)(:)(.*)/);
      const prefix = m ? m[1] + m[3] : '';
      const content = m ? m[4] : line;
      return prefix + content.split('_').join('').split('(').join('').split(')').join('');
    }).join('\n');
    card.value = cleared;
    const ed = getEditor(card.id);
    if (ed) ed.value = cleared;
    updateOverlay(card.id);
    updatePreview(card.id);
  });
  updateUndoRedoBtns();
}

// ── Delete ─────────────────────────────────────────────────────
const deletedStack = [];   // structural snapshots for card-level undo

function deleteCard() {
  // Snapshot before delete so Ctrl+Z can restore
  deletedStack.push({ cards: cards.map(c => ({ ...c })), focusedId });
  if (cards.length <= 1) { cards[0].value = ''; initHist(cards[0].id, ''); render(); return; }
  const idx = cards.findIndex(c => c.id === focusedId);
  cards.splice(idx, 1);
  focusedId = cards[Math.min(idx, cards.length - 1)].id;
  render();
  requestAnimationFrame(() => { const ed = getEditor(focusedId); if (ed) ed.focus(); updateUndoRedoBtns(); });
}

function deleteAll() {
  deletedStack.push({ cards: cards.map(c => ({ ...c })), focusedId });
  cards = [{ id: nextId++, value: '' }];
  focusedId = cards[0].id;
  initHist(focusedId, '');
  render();
  requestAnimationFrame(() => { const ed = getEditor(focusedId); if (ed) ed.focus(); updateUndoRedoBtns(); });
}

// ── Render ─────────────────────────────────────────────────────
function render() {
  const list = document.getElementById('cardsList');
  list.innerHTML = '';

  cards.forEach((card, idx) => {
    // Outer wrapper: index + card side by side
    const wrap = document.createElement('div');
    wrap.className = 'card-wrap';

    const indexEl = document.createElement('div');
    indexEl.className = 'card-index';
    indexEl.textContent = idx + 1;
    wrap.appendChild(indexEl);

    const row = document.createElement('div');
    row.className = 'card-row' + (card.id === focusedId ? ' focused' : '');
    row.id = 'row-' + card.id;
    row.style.flex = '1';  // fill remaining width

    const leftPane = document.createElement('div');
    leftPane.className = 'card-pane';

    const editorContainer = document.createElement('div');
    editorContainer.className = 'editor-container';

    const overlay = document.createElement('div');
    overlay.className = 'card-editor-overlay';
    overlay.id = 'ov-' + card.id;

    const ed = document.createElement('textarea');
    ed.className = 'card-editor';
    ed.id = 'ed-' + card.id;
    ed.value = card.value;
    ed.spellcheck = false;

    editorContainer.appendChild(overlay);
    editorContainer.appendChild(ed);
    leftPane.appendChild(editorContainer);

    const spl = document.createElement('div');
    spl.className = 'card-splitter';

    const rightPane = document.createElement('div');
    rightPane.className = 'card-pane';
    const pv = document.createElement('div');
    pv.className = 'card-preview';
    pv.id = 'pv-' + card.id;
    rightPane.appendChild(pv);

    row.appendChild(leftPane);
    row.appendChild(spl);
    row.appendChild(rightPane);
    wrap.appendChild(row);
    list.appendChild(wrap);

    const resizeEl = document.createElement('div');
    resizeEl.className = 'card-resize';
    resizeEl.style.paddingLeft = '34px'; // align with card (index width + gap)
    list.appendChild(resizeEl);

    setupHorizontalSplit(spl, leftPane, rightPane, row);
    setupVerticalResize(resizeEl, row);

    ed.addEventListener('focus', () => {
      focusedId = card.id;
      document.querySelectorAll('.card-row').forEach(r => r.classList.remove('focused'));
      row.classList.add('focused');
      updateUndoRedoBtns();
    });
    ed.addEventListener('input', () => onInput(card.id));
    ed.addEventListener('paste', e => handlePaste(e, card.id));
    ed.addEventListener('scroll', () => { overlay.scrollTop = ed.scrollTop; });

    updateOverlay(card.id);
    updatePreview(card.id);
  });
}

// ── Keyboard shortcuts ─────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (!e.ctrlKey && !e.metaKey) return;
  const key = e.key.toLowerCase();
  if (key === 'z') { e.preventDefault(); undo(); return; }
  if (key === 'y') { e.preventDefault(); redo(); return; }
  if (key === 'u') { e.preventDefault(); applyFormat('_', '_'); }
  else if (key === 'b') { e.preventDefault(); applyFormat('(', ')'); }
  else if (key === 'g') { e.preventDefault(); applyFormat('++', '++'); }
  else if (key === 'q') { e.preventDefault(); toggleQuestion(); }
  else if (key === '1') { e.preventDefault(); addSpeaker('A'); }
  else if (key === '2') { e.preventDefault(); addSpeaker('B'); }
});

// ── Init ──────────────────────────────────────────────────────
render();
requestAnimationFrame(() => {
  const ed = getEditor(cards[0].id);
  if (ed) ed.focus();
  updateUndoRedoBtns();
});
</script>
